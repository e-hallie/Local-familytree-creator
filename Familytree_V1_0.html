            const isParent = treeData.some(m => m.fatherId === member.id || m.motherId === member.id);

            }
            
            formHtml += `
                    <div class="form-group">
                        <label for="birthDate">Birth Date</label>
                        <input type="text" id="birthDate" value="${member.birthDate}" placeholder="dd/mm/yyyy or mm/yyyy or yyyy">

                        <label style="display:inline-flex;align-items:center;gap:4px;margin-top:4px;font-size:12px;cursor:pointer;">
                            <input type="checkbox" id="birthDateCirca" ${member.birthDateCirca ? 'checked' : ''}> Circa (ca.) — datum is bij benadering
                        </label>
                    </div>
                    <div class="form-group">
                        <label for="birthLocation">Birth Location</label>
                        <input type="text" id="birthLocation" value="${member.birthLocation}">
                    </div>
                    <div class="form-group">
                        <label for="deathDate">Death Date</label>

        function removePerson(node) {
            const member = node.data;
            
            // Find related family members
            const children = treeData.filter(m => m.fatherId === member.id || m.motherId === member.id);
            const father = member.fatherId ? treeData.find(m => m.id === member.fatherId) : null;
            const mother = member.motherId ? treeData.find(m => m.id === member.motherId) : null;
            const spouse = treeData.find(m => 
                (member.childIds.some(childId => m.childIds.includes(childId))) && 
                m.id !== member.id && 
                (m.gender !== member.gender)
            );

            // Build warning message
            let warningMessage = `Are you sure you want to remove ${getFullName(member)}?`;
            let affectedPersons = [];

            if (children.length > 0) {
                affectedPersons.push(`${children.length} child${children.length > 1 ? 'ren' : ''}`);
            }
            if (father) {
                affectedPersons.push(`father (${getFullName(father)})`);
            }
            if (mother) {
                affectedPersons.push(`mother (${getFullName(mother)})`);
            }
            if (spouse) {
                affectedPersons.push(`spouse relationships`);
            }

            if (affectedPersons.length > 0) {
                warningMessage += `\n\nThis will also affect relationships with: ${affectedPersons.join(', ')}`;
            }

            // Show confirmation dialog with double confirmation
            Swal.fire({
                title: 'Remove Family Member',
                text: warningMessage,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',

                        icon: 'error',

                        cancelButtonText: 'No, keep it'
                    }).then((secondResult) => {

                    });

        function performRemoval(member) {
            // Remove the member from treeData
            treeData = treeData.filter(m => m.id !== member.id);
            hasUnsavedChanges = true;

            // Update all other members' relationships
            treeData.forEach(otherMember => {
                // Remove from parent relationships
                if (otherMember.fatherId === member.id) {
                    otherMember.fatherId = null;
                }
                if (otherMember.motherId === member.id) {
                    otherMember.motherId = null;
                }

                // Remove from children lists
                otherMember.childIds = otherMember.childIds.filter(childId => childId !== member.id);
            });

            // Handle the member's children - they become orphans or keep their other parent
            const children = treeData.filter(m => member.childIds.includes(m.id));
            children.forEach(child => {
                if (child.fatherId === member.id) {
                    child.fatherId = null;
                }
                if (child.motherId === member.id) {
                    child.motherId = null;
                }
            });

            // Handle the member's parents - remove this child from their childIds
            if (member.fatherId) {
                const father = treeData.find(m => m.id === member.fatherId);
                if (father) {
                    father.childIds = father.childIds.filter(childId => childId !== member.id);
                }
            }
            if (member.motherId) {
                const mother = treeData.find(m => m.id === member.motherId);
                if (mother) {
                    mother.childIds = mother.childIds.filter(childId => childId !== member.id);
                }
            }

            // Rebuild and render the tree (preserve current view position)
            buildTree();
            renderTree(true);

            // Close any open dialogs
            Swal.close();

            // Show success message
            Swal.fire({
                icon: 'success',
                title: 'Removed!',
                text: `${getFullName(member)} has been removed from the family tree.`,
                timer: 2000,
                showConfirmButton: false
            });
        }

        function validateMemberData(data, memberId) {
            // Required fields
            if (!data.firstName || !data.lastName) {
                return { valid: false, message: 'First name and last name are required.' };
            }
            
            // Helper function to parse incomplete dates in dd/mm/yyyy format
            function parseIncompleteDate(dateStr) {
                if (!dateStr) return null;
                dateStr = dateStr.trim();
                
                // Year only (yyyy)
                if (/^\d{4}$/.test(dateStr)) {
                    return new Date(parseInt(dateStr), 0, 1); // January 1st of that year
                }
                
                // Month/Year (mm/yyyy)
                if (/^\d{1,2}\/\d{4}$/.test(dateStr)) {
                    const [month, year] = dateStr.split('/');
                    return new Date(parseInt(year), parseInt(month) - 1, 1); // 1st day of that month
                }
                
                // Full date (dd/mm/yyyy)
                if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(dateStr)) {
                    const [day, month, year] = dateStr.split('/');
                    const date = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
                    // Validate that the date is valid (handles invalid dates like 31/02/2020)
                    if (date.getDate() != parseInt(day) || 
                        date.getMonth() != parseInt(month) - 1 || 
                        date.getFullYear() != parseInt(year)) {
                        return 'invalid';
                    }
                    return date;
                }
                
                return 'invalid';
            }
            
            // Validate date formats
            if (data.birthDate) {
                const birthDate = parseIncompleteDate(data.birthDate);
                if (birthDate === 'invalid') {
                    return { valid: false, message: 'Birth date must be in format dd/mm/yyyy, mm/yyyy, or yyyy.' };
                }
            }
            
            if (data.deathDate) {
                const deathDate = parseIncompleteDate(data.deathDate);
                if (deathDate === 'invalid') {
                    return { valid: false, message: 'Death date must be in format dd/mm/yyyy, mm/yyyy, or yyyy.' };
                }
            }
            
            if (data.baptismDate) {
                const baptismDate = parseIncompleteDate(data.baptismDate);
                if (baptismDate === 'invalid') {
                    return { valid: false, message: 'Baptism date must be in format dd/mm/yyyy, mm/yyyy, or yyyy.' };
                }
            }
            
            // Date logic validations (only if both dates are provided and parseable)
            if (data.birthDate && data.deathDate) {
                const birthDate = parseIncompleteDate(data.birthDate);
                const deathDate = parseIncompleteDate(data.deathDate);
                
                if (birthDate && deathDate && birthDate !== 'invalid' && deathDate !== 'invalid') {
                    if (birthDate >= deathDate) {
                        return { valid: false, message: 'Birth date must be before death date.' };
                    }
                }
            }
            
            // Age validation (≤ 110 years) - only when both birth and death dates are complete
            if (data.birthDate && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(data.birthDate.trim()) &&
                data.deathDate && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(data.deathDate.trim())) {
                const birthDate = parseIncompleteDate(data.birthDate);
                const compareDate = parseIncompleteDate(data.deathDate);

                if (birthDate && compareDate && birthDate !== 'invalid' && compareDate !== 'invalid') {
                    const ageInYears = (compareDate - birthDate) / (365.25 * 24 * 60 * 60 * 1000);

                    if (ageInYears > 110) {
                        return { valid: false, message: 'Age cannot exceed 110 years.' };
                    }
                }
            }
            
            // Parent-child age gap validation (at least 12 years) - only for complete dates
            const member = treeData.find(m => m.id === memberId);
            if (member && data.birthDate && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(data.birthDate.trim())) {
                const memberBirthDate = parseIncompleteDate(data.birthDate);
                
                if (memberBirthDate && memberBirthDate !== 'invalid') {
                    // Check children
                    for (const childId of member.childIds) {
                        const child = treeData.find(m => m.id === childId);
                        if (child && child.birthDate && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(child.birthDate.trim())) {
                            const childBirthDate = parseIncompleteDate(child.birthDate);
                            if (childBirthDate && childBirthDate !== 'invalid') {
                                const ageDiff = (childBirthDate - memberBirthDate) / (365.25 * 24 * 60 * 60 * 1000);
                                
                                if (ageDiff < 12) {
                                    return { valid: false, message: 'Parent must be at least 12 years older than child.' };
                                }
                            }
                        }
                    }
                    
                    // Check parents
                    if (member.fatherId) {
                        const father = treeData.find(m => m.id === member.fatherId);
                        if (father && father.birthDate && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(father.birthDate.trim())) {
                            const fatherBirthDate = parseIncompleteDate(father.birthDate);
                            if (fatherBirthDate && fatherBirthDate !== 'invalid') {
                                const ageDiff = (memberBirthDate - fatherBirthDate) / (365.25 * 24 * 60 * 60 * 1000);
                                
                                if (ageDiff < 12) {
                                    return { valid: false, message: 'Child must be at least 12 years younger than parent.' };
                                }
                            }
                        }
                    }
                    
                    if (member.motherId) {
                        const mother = treeData.find(m => m.id === member.motherId);
                        if (mother && mother.birthDate && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(mother.birthDate.trim())) {
                            const motherBirthDate = parseIncompleteDate(mother.birthDate);
                            if (motherBirthDate && motherBirthDate !== 'invalid') {
                                const ageDiff = (memberBirthDate - motherBirthDate) / (365.25 * 24 * 60 * 60 * 1000);
                                
                                if (ageDiff < 12) {
                                    return { valid: false, message: 'Child must be at least 12 years younger than parent.' };
                                }
                            }
                        }
                    }
                }
            }
            
            return { valid: true };
        }

        // FIXED GEDCOM PARSER - More robust parsing
        function parseGedcom(gedcomContent) {
            const lines = gedcomContent.split(/\r?\n/);
            const result = {
                version: '5.5',
                individuals: [],
                families: [],
                fileName: null
            };
            
            let currentRecord = null;
            let currentElement = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                // More robust line parsing
                const lineMatch = line.match(/^(\d+)\s+(@[^@]+@\s+)?(.+)$/);
                if (!lineMatch) continue;
                
                const level = parseInt(lineMatch[1]);
                const xref = lineMatch[2] ? lineMatch[2].trim() : null;
                const remainder = lineMatch[3].trim();
                
                let tag, value;
                
                if (xref) {
                    // Line has an xref (e.g., "0 @I1@ INDI")
                    const parts = remainder.split(/\s+(.+)/);
                    tag = parts[0];
                    value = parts[1] || '';
                } else {
                    // Line doesn't have xref (e.g., "1 NAME John Doe")
                    const parts = remainder.split(/\s+(.+)/);
                    tag = parts[0];
                    value = parts[1] || '';
                }
                
                // Level 0 records
                if (level === 0) {
                    if (tag === 'HEAD') {
                        currentRecord = { type: 'HEAD' };
                    } else if (xref && tag === 'INDI') {
                        // Individual record
                        currentRecord = {
                            type: 'INDI',
                            id: xref.replace(/@/g, ''),
                            name: { given: '', prefix: '', surname: '' },
                            sex: '',
                            events: [],
                            families: { child: [], spouse: [] },
                            attributes: []
                        };
                        result.individuals.push(currentRecord);
                    } else if (xref && tag === 'FAM') {
                        // Family record
                        currentRecord = {
                            type: 'FAM',
                            id: xref.replace(/@/g, ''),
                            husband: null,
                            wife: null,
                            children: []
                        };
                        result.families.push(currentRecord);
                    } else if (tag === 'TRLR') {
                        // Trailer - end of file
                        break;
                    } else {
                        // Unknown record type, skip
                        currentRecord = null;
                    }
                    currentElement = currentRecord;
                    continue;
                }
                
                if (!currentRecord) continue;
                
                // Header parsing
                if (currentRecord.type === 'HEAD') {
                    if (level === 1) {
                        if (tag === 'GEDC') {
                            currentElement = { type: 'GEDC' };
                        } else if (tag === 'FILE') {
                            result.fileName = value.replace(/\.(ged|gedcom)$/i, '');
                        }
                    } else if (level === 2) {
                        if (tag === 'VERS' && currentElement && currentElement.type === 'GEDC') {
                            result.version = value;
                        }
                    }
                    continue;
                }
                
                // Individual parsing
                if (currentRecord.type === 'INDI') {
                    if (level === 1) {
                        currentElement = null;
                        switch (tag) {
                            case 'NAME':
                                currentElement = { type: 'NAME', value: value };
                                parseGedcomName(value, currentRecord.name);
                                break;
                            case 'SEX':
                                currentRecord.sex = value;
                                break;
                            case 'BIRT':
                                currentElement = { type: 'BIRT', date: '', place: '' };
                                currentRecord.events.push(currentElement);
                                break;
                            case 'DEAT':
                                currentElement = { type: 'DEAT', date: '', place: '' };
                                currentRecord.events.push(currentElement);
                                break;
                            case 'BAPM':
                            case 'BAPT':
                            case 'CHR':
                                currentElement = { type: 'BAPM', date: '', place: '' };
                                currentRecord.events.push(currentElement);
                                break;
                            case 'RELI':
                                currentRecord.attributes.push({ type: 'RELI', value: value });
                                break;
                            case 'OCCU':
                                currentRecord.attributes.push({ type: 'OCCU', value: value });
                                break;
                            case 'NOTE':
                                currentRecord.attributes.push({ type: 'NOTE', value: value });
                                break;
                            case '_STAT':
                                currentRecord.attributes.push({ type: '_STAT', value: value });
                                break;
                            case 'SOUR':
                                currentRecord.attributes.push({ type: 'SOUR', value: value });
                                break;
                            case 'FAMC':
                                // Family as child
                                const famcId = value.replace(/@/g, '');
                                if (famcId) currentRecord.families.child.push(famcId);
                                break;
                            case 'FAMS':
                                // Family as spouse
                                const famsId = value.replace(/@/g, '');
                                if (famsId) currentRecord.families.spouse.push(famsId);
                                break;
                        }
                    } else if (level === 2 && currentElement) {
                        switch (tag) {
                            case 'GIVN':
                                if (currentElement.type === 'NAME') {
                                    currentRecord.name.given = value;
                                }
                                break;
                            case 'SPFX':
                                if (currentElement.type === 'NAME') {
                                    currentRecord.name.prefix = value;
                                }
                                break;
                            case 'SURN':
                                if (currentElement.type === 'NAME') {
                                    currentRecord.name.surname = value;
                                }
                                break;
                            case 'DATE':
                                if (currentElement.date !== undefined) {
                                    currentElement.date = value;
                                }
                                break;
                            case 'PLAC':
                                if (currentElement.place !== undefined) {
                                    currentElement.place = value;
                                }
                                break;
                        }
                    } else if (level === 2 && !currentElement) {
                        // Handle continuation lines for notes
                        if (tag === 'CONT' || tag === 'CONC') {
                            const lastAttr = currentRecord.attributes[currentRecord.attributes.length - 1];
                            if (lastAttr && lastAttr.type === 'NOTE') {
                                if (tag === 'CONT') {
                                    lastAttr.value += '\n' + value;
                                } else {
                                    lastAttr.value += value;
                                }
                            }
                        }
                    }
                }
                
                // Family parsing
                if (currentRecord.type === 'FAM') {
                    if (level === 1) {
                        switch (tag) {
                            case 'HUSB':
                                const husbId = value.replace(/@/g, '');
                                if (husbId) currentRecord.husband = husbId;
                                break;
                            case 'WIFE':
                                const wifeId = value.replace(/@/g, '');
                                if (wifeId) currentRecord.wife = wifeId;
                                break;
                            case 'CHIL':
                                const childId = value.replace(/@/g, '');
                                if (childId) currentRecord.children.push(childId);
                                break;
                        }
                    }
                }
            }
            
            // Log parsing results for debugging
            console.log(`Parsed ${result.individuals.length} individuals and ${result.families.length} families`);
            
            return result;
        }

        // Improved GEDCOM name parser
        function parseGedcomName(nameStr, nameObj) {
            if (!nameStr) return;
            
            // Initialize with defaults
            nameObj.given = '';
            nameObj.surname = '';
            
            // GEDCOM name format: "Given /Surname/" or "Given Surname"
            const surnameMatch = nameStr.match(/\/([^\/]*)\//);
            if (surnameMatch) {
                // Extract surname from between slashes
                nameObj.surname = surnameMatch[1].trim();
                // Remove the surname part and get the given name
                const givenPart = nameStr.replace(/\/[^\/]*\//, ' ').trim();
                nameObj.given = givenPart;
            } else {
                // No slashes - try to split intelligently
                const parts = nameStr.trim().split(/\s+/);
                if (parts.length === 0) {
                    nameObj.given = '?';
                } else if (parts.length === 1) {
                    // Only one part - could be given or surname
                    // Assume it's given name
                    nameObj.given = parts[0];
                } else {
                    // Multiple parts - assume last is surname
                    nameObj.surname = parts[parts.length - 1];
                    nameObj.given = parts.slice(0, -1).join(' ');
                }
            }
            
            // Ensure we have at least placeholder values
            if (!nameObj.given) nameObj.given = '?';
            if (!nameObj.surname) nameObj.surname = '?';
        }

        function convertGedcomToTreeData(gedcomData) {
            const members = [];
            const idMapping = new Map(); // Map GEDCOM IDs to new sequential IDs
            let currentId = 1;
            
            // First pass: Create all individuals
            gedcomData.individuals.forEach(individual => {
                const newId = currentId++;
                idMapping.set(individual.id, newId);
                
                // Find events
                const birthEvent = individual.events.find(e => e.type === 'BIRT');
                const deathEvent = individual.events.find(e => e.type === 'DEAT');
                const baptismEvent = individual.events.find(e => e.type === 'BAPM');
                
                // Find attributes
                const religion = individual.attributes.find(a => a.type === 'RELI');
                const occupation = individual.attributes.find(a => a.type === 'OCCU');
                const note = individual.attributes.find(a => a.type === 'NOTE');
                const validationStat = individual.attributes.find(a => a.type === '_STAT');
                
                const member = {
                    id: newId,
                    firstName: individual.name.given || '?',
                    namePrefix: individual.name.prefix || '',
                    lastName: individual.name.surname || '?',
                    gender: individual.sex === 'F' ? 'Female' : 'Male',
                    birthDate: birthEvent ? convertGedcomDateToInternal(birthEvent.date) : '',
                    birthDateCirca: birthEvent ? isGedcomDateCirca(birthEvent.date) : false,
                    birthLocation: birthEvent ? birthEvent.place : '',
                    deathDate: deathEvent ? convertGedcomDateToInternal(deathEvent.date) : '',
                    deathDateCirca: deathEvent ? isGedcomDateCirca(deathEvent.date) : false,
                    deathLocation: deathEvent ? deathEvent.place : '',
                    baptismDate: baptismEvent ? convertGedcomDateToInternal(baptismEvent.date) : '',
                    religion: religion ? religion.value : '',
                    interestingActivity: occupation ? occupation.value : '',
                    notes: note ? note.value : '',
                    sources: individual.attributes.filter(a => a.type === 'SOUR').map(a => a.value).join('\n'),
                    validationStatus: validationStat ? validationStat.value : '',
                    fatherId: null,
                    motherId: null,
                    childIds: [],
                    _gedcomId: individual.id, // Keep original for relationship mapping
                    _gedcomFamilies: individual.families
                };
                
                members.push(member);
            });
            
            // Second pass: Establish family relationships
            gedcomData.families.forEach(family => {
                const fatherId = family.husband ? idMapping.get(family.husband) : null;
                const motherId = family.wife ? idMapping.get(family.wife) : null;
                
                family.children.forEach(childGedcomId => {
                    const childId = idMapping.get(childGedcomId);
                    if (childId) {
                        const child = members.find(m => m.id === childId);
                        if (child) {
                            if (fatherId) {
                                child.fatherId = fatherId;
                                const father = members.find(m => m.id === fatherId);
                                if (father && !father.childIds.includes(childId)) {
                                    father.childIds.push(childId);
                                }
                            }
                            if (motherId) {
                                child.motherId = motherId;
                                const mother = members.find(m => m.id === motherId);
                                if (mother && !mother.childIds.includes(childId)) {
                                    mother.childIds.push(childId);
                                }
                            }
                        }
                    }
                });
            });
            
            // Clean up temporary GEDCOM data
            members.forEach(member => {
                delete member._gedcomId;
                delete member._gedcomFamilies;
            });
            
            return {
                members: members,
                nextId: currentId
            };
        }

        // Check if a GEDCOM date string has an approximate qualifier (ABT, ABOUT, EST, CAL)
        function isGedcomDateCirca(gedcomDate) {
            if (!gedcomDate) return false;
            return /^(ABT|ABOUT|EST|ESTIMATED|CAL|CALCULATED)\s+/i.test(gedcomDate.trim());
        }

        function convertGedcomDateToInternal(gedcomDate) {
            if (!gedcomDate) return '';

            // Clean the date string
            gedcomDate = gedcomDate.trim().toUpperCase();

            // Remove common GEDCOM date qualifiers
            gedcomDate = gedcomDate.replace(/^(ABT|ABOUT|EST|ESTIMATED|CAL|CALCULATED|AFT|AFTER|BEF|BEFORE|BET|BETWEEN|FROM|TO)\s+/i, '');
            
            // Handle "BETWEEN date1 AND date2" - take first date
            if (gedcomDate.includes(' AND ')) {
                gedcomDate = gedcomDate.split(' AND ')[0].replace(/^BETWEEN\s+/i, '');
            }
            
            // Month name mapping
            const monthMap = {
                'JAN': '01', 'FEB': '02', 'MAR': '03', 'APR': '04',
                'MAY': '05', 'JUN': '06', 'JUL': '07', 'AUG': '08',
                'SEP': '09', 'OCT': '10', 'NOV': '11', 'DEC': '12'
            };
            
            // Year only (4 digits)
            if (/^\d{4}$/.test(gedcomDate)) {
                return gedcomDate;
            }
            
            // DD MON YYYY format (e.g., "15 MAY 1990")
            const fullDateMatch = gedcomDate.match(/^(\d{1,2})\s+([A-Z]{3})\s+(\d{4})$/);
            if (fullDateMatch) {
                const day = fullDateMatch[1].padStart(2, '0');
                const month = monthMap[fullDateMatch[2]] || '01';
                const year = fullDateMatch[3];
                return `${day}/${month}/${year}`;
            }
            
            // MON YYYY format (e.g., "MAY 1990")
            const monthYearMatch = gedcomDate.match(/^([A-Z]{3})\s+(\d{4})$/);
            if (monthYearMatch) {
                const month = monthMap[monthYearMatch[1]] || '01';
                const year = monthYearMatch[2];
                return `${month}/${year}`;
            }
            
            // Try to extract just the year if other formats fail
            const yearMatch = gedcomDate.match(/(\d{4})/);
            if (yearMatch) {
                return yearMatch[1];
            }
            
            // Return empty string if we can't parse it
            return '';
        }

        function saveFile() {
            try {
                const xmlString = generateXML();
                const blob = new Blob([xmlString], { type: 'text/xml' });
                const url = URL.createObjectURL(blob);
                
                // Get the tree name from the title field and clean it for filename use
                const treeName = document.getElementById('appTitle').textContent.trim();
                const cleanTreeName = sanitizeFilename(treeName);
                
                // Generate filename with tree name and date-time stamp
                const now = new Date();
                const year = now.getFullYear();
                const month = (now.getMonth() + 1).toString().padStart(2, '0');
                const day = now.getDate().toString().padStart(2, '0');
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const seconds = now.getSeconds().toString().padStart(2, '0');
                
                const filename = `${cleanTreeName}_${year}-${month}-${day}_${hours}-${minutes}-${seconds}.xml`;
                
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                hasUnsavedChanges = false;

                Swal.fire({
                    icon: 'success',
                    title: 'Saved!',
                    text: `Family tree has been saved to ${filename}`,
                    timer: 2000,
                    showConfirmButton: false
                });

            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Save Error',
                    text: 'Failed to save file: ' + error.message
                });
            }
        }

        function generateGEDCOM() {
            const now = new Date();

            let gedcom = '';

            // Header section
            gedcom += '0 HEAD\n';
            gedcom += '1 GEDC\n';
            gedcom += '2 VERS 7.0\n';
            gedcom += '2 FORM LINEAGE-LINKED\n';
            gedcom += '1 CHAR UTF-8\n';
            gedcom += `1 SOUR Family Tree Application\n`;
            gedcom += `2 VERS 1.0\n`;
            gedcom += `2 NAME Family Tree Application\n`;
            gedcom += `1 DATE ${formatGedcomDate(now)}\n`;
            gedcom += `2 TIME ${now.toTimeString().substring(0, 8)}\n`;
            gedcom += `1 FILE ${sanitizeFilename(document.getElementById('appTitle').textContent.trim())}.ged\n`;
            
            // Individual records
            treeData.forEach(member => {
                gedcom += `0 @I${member.id}@ INDI\n`;
                
                // Name
                const firstName = escapeGedcom(member.firstName || '?');
                const prefix = escapeGedcom(member.namePrefix || '');
                const lastName = escapeGedcom(member.lastName || '?');
                const fullSurname = prefix ? `${prefix} ${lastName}` : lastName;
                gedcom += `1 NAME ${firstName} /${fullSurname}/\n`;
                gedcom += `2 GIVN ${firstName}\n`;
                if (prefix) {
                    gedcom += `2 SPFX ${prefix}\n`;
                }
                gedcom += `2 SURN ${lastName}\n`;
                
                // Gender/Sex
                const sex = member.gender === 'Female' ? 'F' : 'M';
                gedcom += `1 SEX ${sex}\n`;
                
                // Birth event
                if (member.birthDate || member.birthLocation) {
                    gedcom += '1 BIRT\n';
                    if (member.birthDate) {
                        const abtPrefix = member.birthDateCirca ? 'ABT ' : '';
                        gedcom += `2 DATE ${abtPrefix}${convertToGedcomDate(member.birthDate)}\n`;
                    }
                    if (member.birthLocation) {
                        gedcom += `2 PLAC ${escapeGedcom(member.birthLocation)}\n`;
                    }
                }

                // Death event
                if (member.deathDate || member.deathLocation) {
                    gedcom += '1 DEAT\n';
                    if (member.deathDate) {
                        const abtPrefix = member.deathDateCirca ? 'ABT ' : '';
                        gedcom += `2 DATE ${abtPrefix}${convertToGedcomDate(member.deathDate)}\n`;
                    }
                    if (member.deathLocation) {
                        gedcom += `2 PLAC ${escapeGedcom(member.deathLocation)}\n`;
                    }
                }
                
                // Baptism event
                if (member.baptismDate) {
                    gedcom += '1 BAPM\n';
                    gedcom += `2 DATE ${convertToGedcomDate(member.baptismDate)}\n`;
                }
                
                // Religion
                if (member.religion) {
                    gedcom += `1 RELI ${escapeGedcom(member.religion)}\n`;
                }
                
                // Occupation (interesting activity)
                if (member.interestingActivity) {
                    gedcom += `1 OCCU ${escapeGedcom(member.interestingActivity)}\n`;
                }
                
                // Notes
                if (member.notes) {
                    gedcom += `1 NOTE ${escapeGedcom(member.notes)}\n`;
                }

                // Sources
                if (member.sources) {
                    member.sources.split('\n').forEach(line => {
                        const trimmed = line.trim();
                        if (trimmed) {
                            gedcom += `1 SOUR ${escapeGedcom(trimmed)}\n`;
                        }
                    });
                }

                // Validation status (custom tag)
                if (member.validationStatus) {
                    gedcom += `1 _STAT ${escapeGedcom(member.validationStatus)}\n`;
                }

                // Family relationships will be added via family records
                // Find families where this person is a child
                const parentFamily = findParentFamily(member);
                if (parentFamily) {
                    gedcom += `1 FAMC @F${parentFamily.id}@\n`;
                }
                
                // Find families where this person is a parent
                const spouseFamilies = findSpouseFamilies(member);
                spouseFamilies.forEach(family => {
                    gedcom += `1 FAMS @F${family.id}@\n`;
                });
            });
            
            // Family records
            const families = generateFamilyRecords();
            families.forEach(family => {
                gedcom += `0 @F${family.id}@ FAM\n`;
                
                if (family.husband) {
                    gedcom += `1 HUSB @I${family.husband.id}@\n`;
                }
                if (family.wife) {
                    gedcom += `1 WIFE @I${family.wife.id}@\n`;
                }
                
                family.children.forEach(child => {
                    gedcom += `1 CHIL @I${child.id}@\n`;
                });
            });
            
            // Trailer
            gedcom += '0 TRLR\n';
            
            return gedcom;
        }

        function findParentFamily(member) {
            if (!member.fatherId && !member.motherId) return null;
            
            const father = member.fatherId ? treeData.find(m => m.id === member.fatherId) : null;
            const mother = member.motherId ? treeData.find(m => m.id === member.motherId) : null;
            
            // Generate a unique family ID based on parents
            let familyId = '';
            if (father && mother) {
                familyId = `${Math.min(father.id, mother.id)}_${Math.max(father.id, mother.id)}`;
            } else if (father) {
                familyId = `${father.id}_single`;
            } else if (mother) {
                familyId = `${mother.id}_single`;
            }
            
            return {
                id: familyId,
                husband: father,
                wife: mother,
                children: [member]
            };
        }

        function findSpouseFamilies(member) {
            const families = [];
            
            // Find all children of this member
            const children = treeData.filter(m => 
                m.fatherId === member.id || m.motherId === member.id
            );
            
            if (children.length === 0) return families;
            
            // Group children by their other parent to create family units
            const familyGroups = new Map();
            
            children.forEach(child => {
                const otherParentId = member.gender === 'Male' ? child.motherId : child.fatherId;
                const key = otherParentId || 'single';
                
                if (!familyGroups.has(key)) {
                    familyGroups.set(key, []);
                }
                familyGroups.get(key).push(child);
            });
            
            familyGroups.forEach((childrenGroup, otherParentId) => {
                const otherParent = otherParentId !== 'single' ? 
                    treeData.find(m => m.id === parseInt(otherParentId)) : null;
                
                let familyId;
                if (otherParent) {
                    familyId = `${Math.min(member.id, otherParent.id)}_${Math.max(member.id, otherParent.id)}`;
                } else {
                    familyId = `${member.id}_single`;
                }
                
                families.push({
                    id: familyId,
                    husband: member.gender === 'Male' ? member : otherParent,
                    wife: member.gender === 'Female' ? member : otherParent,
                    children: childrenGroup
                });
            });
            
            return families;
        }

        function generateFamilyRecords() {
            const familyMap = new Map();
            
            // Process all members to create family records
            treeData.forEach(member => {
                // Create family for this person's parents if they exist
                if (member.fatherId || member.motherId) {
                    const father = member.fatherId ? treeData.find(m => m.id === member.fatherId) : null;
                    const mother = member.motherId ? treeData.find(m => m.id === member.motherId) : null;
                    
                    let familyId;
                    if (father && mother) {
                        familyId = `${Math.min(father.id, mother.id)}_${Math.max(father.id, mother.id)}`;
                    } else if (father) {
                        familyId = `${father.id}_single`;
                    } else if (mother) {
                        familyId = `${mother.id}_single`;
                    }
                    
                    if (!familyMap.has(familyId)) {
                        familyMap.set(familyId, {
                            id: familyId,
                            husband: father,
                            wife: mother,
                            children: []
                        });
                    }
                    
                    familyMap.get(familyId).children.push(member);
                }
            });
            
            return Array.from(familyMap.values());
        }

        function convertToGedcomDate(dateStr) {
            if (!dateStr) return '';
            
            dateStr = dateStr.trim();
            
            // Year only (yyyy)
            if (/^\d{4}$/.test(dateStr)) {
                return dateStr;
            }
            
            // Month/Year (mm/yyyy)
            if (/^\d{1,2}\/\d{4}$/.test(dateStr)) {
                const [month, year] = dateStr.split('/');
                const monthNames = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN',
                                   'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
                const monthName = monthNames[parseInt(month) - 1];
                return `${monthName} ${year}`;
            }
            
            // Full date (dd/mm/yyyy)
            if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(dateStr)) {
                const [day, month, year] = dateStr.split('/');
                const monthNames = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN',
                                   'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
                const monthName = monthNames[parseInt(month) - 1];
                return `${parseInt(day)} ${monthName} ${year}`;
            }
            
            // Return as is if format is unknown
            return dateStr;
        }

        function formatGedcomDate(date) {
            const day = date.getDate();
            const monthNames = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN',
                               'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            const month = monthNames[date.getMonth()];
            const year = date.getFullYear();
            
            return `${day} ${month} ${year}`;
        }

        function escapeGedcom(str) {
            if (!str) return '';
            // GEDCOM 7.0 uses UTF-8, so most characters are allowed
            // Just replace line breaks with spaces and trim excessive whitespace
            return str.replace(/\r?\n/g, ' ').replace(/\s+/g, ' ').trim();
        }

        function sanitizeFilename(filename) {
            if (!filename || filename.trim().length === 0) {
                return 'FamilyTree';
            }

            // Strip repeated "Family Tree of:", "Family Tree:", etc. prefixes
            let stripped = filename;
            while (/^Family\s*Tree\s*(of\s*)?[:\-]?\s*/i.test(stripped)) {
                stripped = stripped.replace(/^Family\s*Tree\s*(of\s*)?[:\-]?\s*/i, '');
            }
            // Also strip underscored variants (from previously saved filenames)
            while (/^Family_Tree_?(of_?)?/i.test(stripped)) {
                stripped = stripped.replace(/^Family_Tree_?(of_?)?/i, '');
            }
            // Strip ALL timestamp patterns from anywhere in the string (not just leading)
            // Pattern 1: _YYYY-MM-DD_HH-MM-SS (from saveFile/exportGedcom)
            stripped = stripped.replace(/_?\d{4}-\d{2}-\d{2}_\d{2}-\d{2}-\d{2}/g, '');
            // Pattern 2: _YYYYMMDDTHHMMSS (from generateGEDCOM 1 FILE header, e.g. 20260226T082200)
            stripped = stripped.replace(/_?\d{8}T\d{4,6}/g, '');
            // Pattern 3: _YYYY-MM-DDTHHMM (e.g. 2026-02-26T0822)
            stripped = stripped.replace(/_?\d{4}-\d{2}-\d{2}T\d{4,6}/g, '');
            // Clean up any resulting double underscores or trailing underscores
            stripped = stripped.replace(/_{2,}/g, '_').replace(/^_|_$/g, '');
            // Use stripped version if it still has content, otherwise use original
            if (stripped.trim().length > 0) {
                filename = stripped.trim();
            }

            // Remove or replace invalid characters for filenames
            let cleaned = filename
                .replace(/[<>:"/\\|?*]/g, '') // Remove invalid characters
                .replace(/\s+/g, '_') // Replace spaces with underscores
                .replace(/_{2,}/g, '_') // Replace multiple underscores with single
                .replace(/^_|_$/g, '') // Remove leading/trailing underscores
                .substring(0, 50); // Limit length to 50 characters
            
            // If after cleaning we have nothing left, use default name
            if (cleaned.length === 0) {
                cleaned = 'FamilyTree';
            }
            
            return cleaned;
        }

        function generateXML() {
            let xml = '<?xml version="1.0" encoding="UTF-8"?>\n<familyTree>\n';
            
            treeData.forEach(member => {
                xml += '    <member';
                xml += ` id="${member.id}"`;
                xml += ` firstName="${escapeXML(member.firstName)}"`;
                xml += ` namePrefix="${escapeXML(member.namePrefix || '')}"`;
                xml += ` lastName="${escapeXML(member.lastName)}"`;
                xml += ` gender="${member.gender}"`;
                xml += ` birthDate="${member.birthDate}"`;
                xml += ` birthDateCirca="${member.birthDateCirca ? 'true' : ''}"`;
                xml += ` birthLocation="${escapeXML(member.birthLocation)}"`;
                xml += ` deathDate="${member.deathDate}"`;
                xml += ` deathDateCirca="${member.deathDateCirca ? 'true' : ''}"`;
                xml += ` deathLocation="${escapeXML(member.deathLocation)}"`;
                xml += ` baptismDate="${member.baptismDate}"`;
                xml += ` religion="${escapeXML(member.religion)}"`;
                xml += ` interestingActivity="${escapeXML(member.interestingActivity)}"`;
                xml += ` notes="${escapeXML(member.notes)}"`;
                xml += ` sources="${escapeXML(member.sources || '')}"`;
                xml += ` validationStatus="${member.validationStatus || ''}"`;
                xml += ` fatherId="${member.fatherId || ''}"`;
                xml += ` motherId="${member.motherId || ''}"`;
                xml += ` childIds="${member.childIds.join(',')}"`;
                xml += '/>\n';
            });
            
            xml += '</familyTree>';
            return xml;
        }

        function escapeXML(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                     .replace(/</g, '&lt;')
                     .replace(/>/g, '&gt;')
                     .replace(/"/g, '&quot;')
                     .replace(/'/g, '&#39;');
        }

        // Zoom and pan controls
        function zoomBy(factor) {
            svg.transition().duration(300).call(
                zoom.scaleBy, factor
            );
        }

        function resetView() {
            svg.transition().duration(500).call(
                zoom.transform,
                d3.zoomIdentity
            );
        }

        function handleZoomSlider(event) {
            const scale = parseFloat(event.target.value);
            svg.transition().duration(100).call(
                zoom.scaleTo, scale
            );
        }

        function updateZoomDisplay(scale) {
            const percentage = Math.round(scale * 100);
            document.getElementById('zoomValue').textContent = percentage + '%';
            document.getElementById('zoomSlider').value = scale;
        }

        function handleKeyboard(event) {
            // Handle Ctrl+F or Cmd+F for search
            if ((event.ctrlKey || event.metaKey) && event.key === 'f') {
                event.preventDefault();
                document.getElementById('searchInput').focus();
                return;
            }
            
            // Handle Escape to clear search
            if (event.key === 'Escape') {
                if (document.getElementById('searchInput').value) {
                    clearSearch();
                    return;
                }
            }
            
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;
            
            const step = 50;
            const currentTransform = d3.zoomTransform(svg.node());
            
            switch(event.key) {
                case 'ArrowLeft':
                    event.preventDefault();
                    svg.call(zoom.translateBy, -step, 0);
                    break;
                case 'ArrowRight':
                    event.preventDefault();
                    svg.call(zoom.translateBy, step, 0);
                    break;
                case 'ArrowUp':
                    event.preventDefault();
                    svg.call(zoom.translateBy, 0, -step);
                    break;
                case 'ArrowDown':
                    event.preventDefault();
                    svg.call(zoom.translateBy, 0, step);
                    break;
                case '+':
                case '=':
                    event.preventDefault();
                    zoomBy(1.2);
                    break;
                case '-':
                    event.preventDefault();
                    zoomBy(0.8);
                    break;
                case '0':
                    event.preventDefault();
                    resetView();
                    break;
            }
        }
    </script>
